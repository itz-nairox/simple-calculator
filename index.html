<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itz-vold | Simple Calculator</title>
    <link rel="stylesheet" href="./assets/style/style.css">
</head>
<body>
    
    <div class="root">
        <div class="calc">
            <div class="screen">
                0
            </div>
            <div class="numpad">
                <div class="row seprated">
                    <button class="three-btn rounded functional">C</button>
                    <button class="functional">%</button>
                    <button class="functional">&leftarrow;</button>
                    <button class="functional">&divide;</button>
                </div>
                <div class="row">
                    <button class="number">1</button>
                    <button class="number">2</button>
                    <button class="number">3</button>
                    <button class="functional">&plus;</button>
                </div>
                <div class="row">
                    <button class="number">4</button>
                    <button class="number">5</button>
                    <button class="number">6</button>
                    <button class="functional">&minus;</button>
                </div>
                <div class="row">
                    <button class="number">7</button>
                    <button class="number">8</button>
                    <button class="number">9</button>
                    <button class="functional">&times;</button>
                </div>
                <div class="row">
                    <button class="number two-btn">0</button>
                    <button class="functional">.</button>
                    <button class="functional">&equals;</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/logic/script.js"></script>
</body>
</html>
